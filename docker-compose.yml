version: "3.8"

services:
  decision-memo-service:
    build: .
    container_name: decision-memo-service
    ports:
      - "8600:8600"
    environment:
      - DMS_DEBUG=false
      - DMS_SCORING_SERVICE_URL=http://host.docker.internal:8005
      - DMS_DEMAND_LAYER_URL=http://host.docker.internal:8090
      - DMS_TCS_URL=http://host.docker.internal:8400
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8600/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
