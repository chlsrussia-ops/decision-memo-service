services:
  decision-memo-service:
    build: .
    container_name: decision-memo-service
    ports:
      - "127.0.0.1:8600:8600"
    mem_limit: 512m
    env_file: .env
    environment:
      - DMS_DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8600/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
